name: CI/CD Pipeline

on:
  push:
    branches:
      - feature/*
      - main
  create:
    tags:
      - 'v*.*.*'

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: my-app
  CLUSTER_NAME: my-eks-cluster

jobs:

# =========================
# BUILD & PUSH IMAGE
# =========================
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "image_tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "image_tag=${GITHUB_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login --username AWS --password-stdin \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com

      - name: Build image
        run: |
          docker build -t $ECR_REPOSITORY:${{ steps.meta.outputs.image_tag }} .

      - name: Tag image
        run: |
          docker tag $ECR_REPOSITORY:${{ steps.meta.outputs.image_tag }} \
          ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ steps.meta.outputs.image_tag }}

      - name: Push image
        run: |
          docker push ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ steps.meta.outputs.image_tag }}

# =========================
# DEPLOY DEV
# =========================
  deploy-dev:
    if: startsWith(github.ref, 'refs/heads/feature/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_DEV_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_DEV_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name dev-cluster --region $AWS_REGION

      - name: Deploy to Dev
        run: |
          kubectl set image deployment/my-app \
          my-app=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ needs.build.outputs.image_tag }} \
          -n dev

# =========================
# DEPLOY STAGING
# =========================
  deploy-staging:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_STG_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_STG_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name staging-cluster --region $AWS_REGION

      - name: Deploy to Staging
        run: |
          kubectl set image deployment/my-app \
          my-app=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ needs.build.outputs.image_tag }} \
          -n staging

# =========================
# DEPLOY PRODUCTION (CANARY)
# =========================
  deploy-prod:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Manual approval
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ secrets.GITHUB_TOKEN }}
          approvers: your-github-username
          minimum-approvals: 1

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_PROD_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_PROD_SECRET_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name prod-cluster --region $AWS_REGION

      - name: Deploy GREEN version
        run: |
          kubectl set image deployment/my-app-green \
          my-app=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:${{ needs.build.outputs.image_tag }} \
          -n prod

      - name: Canary 10%
        run: |
          aws elbv2 modify-listener \
          --listener-arn ${{ secrets.ALB_LISTENER_ARN }} \
          --default-actions Type=forward,ForwardConfig='{"TargetGroups":[{"TargetGroupArn":"${{ secrets.TG_BLUE }}","Weight":90},{"TargetGroupArn":"${{ secrets.TG_GREEN }}","Weight":10}]}'

      - name: Wait and monitor
        run: sleep 120

      - name: Canary 50%
        run: |
          aws elbv2 modify-listener \
          --listener-arn ${{ secrets.ALB_LISTENER_ARN }} \
          --default-actions Type=forward,ForwardConfig='{"TargetGroups":[{"TargetGroupArn":"${{ secrets.TG_BLUE }}","Weight":50},{"TargetGroupArn":"${{ secrets.TG_GREEN }}","Weight":50}]}'

      - name: Wait and monitor
        run: sleep 120

      - name: Full rollout 100%
        run: |
          aws elbv2 modify-listener \
          --listener-arn ${{ secrets.ALB_LISTENER_ARN }} \
          --default-actions Type=forward,ForwardConfig='{"TargetGroups":[{"TargetGroupArn":"${{ secrets.TG_BLUE }}","Weight":0},{"TargetGroupArn":"${{ secrets.TG_GREEN }}","Weight":100}]}'